mode: prod
sensors:
  polling_frequency_hz: 50
  list:
    drum:
      gpio: 17
      type: impulse
      nominal_rpm: 800
      warn_low: 600
      warn_high: 1000
      error_threshold_low: 100
      error_duration_ms: 2000
      debounce_ms: 50
      description: Скорость вращения барабана
      units: об/мин
      enabled: true
      show_in_panel: true
    kolosa:
      gpio: 27
      type: impulse
      nominal_rpm: 400
      warn_low: 300
      warn_high: 500
      error_threshold_low: 50
      error_duration_ms: 2000
      debounce_ms: 50
      description: Скорость вращения колосового механизма
      units: об/мин
      enabled: true
      show_in_panel: true
    solomotryas:
      gpio: 24
      type: impulse
      nominal_rpm: 600
      warn_low: 450
      warn_high: 750
      error_threshold_low: 80
      error_duration_ms: 2000
      debounce_ms: 50
      description: Скорость вращения соломотряса
      units: об/мин
      enabled: true
      show_in_panel: false
    fan_speed:
      gpio: 23
      type: impulse
      nominal_rpm: 1200
      warn_low: 1000
      warn_high: 1400
      error_threshold_low: 200
      error_duration_ms: 2000
      debounce_ms: 50
      description: Скорость вращения вентилятора
      units: об/мин
      enabled: true
      show_in_panel: true
    bin_level:
      gpio: 22
      type: discrete
      description: Уровень заполнения бункера
      units: статус
      debounce_ms: 100
      enabled: true
      show_in_panel: false
unload_logic:
  bin_full_sensor: 22
  min_full_duration_ms: 1000
  min_empty_duration_ms: 500
  debounce_ms: 100
  description: Логика определения событий разгрузки
error_history:
  max_entries: 20
logging:
  data_dir: data
  date_format: '%Y-%m-%d'
  csv_log_enabled: true
  description: Логирование событий в CSV
ui:
  resolution:
    width: 1200
    height: 600
  orientation: horizontal
  fonts:
    title: 32
    value: 34
    label: 16
    time: 26
    menu: 18
  theme: light
  window_mode: windowed
  transparent: false
  colors_light:
    background: '#F4F6F8'
    surface: '#FFFFFF'
    text_primary: '#1A1A1A'
    text_secondary: '#546E7A'
    primary: '#1565C0'
    error_critical: '#C62828'
    error_warning: '#E65100'
    border: '#D1D8E0'
    menu_background: '#E8ECF0'
  colors_dark:
    background: '#111318'
    surface: '#1E2028'
    text_primary: '#E8EAED'
    text_secondary: '#8E9BB0'
    primary: '#4FC3F7'
    error_critical: '#EF5350'
    error_warning: '#FFB300'
    border: '#2F3340'
    menu_background: '#252830'
interface:
  display_sensors:
  - drum
  - kolosa
  - solomotryas
  - fan_speed
  main_sensor: drum
  ui_update_frequency_hz: 10
  show_time: true
  time_format: '%H:%M:%S'
  show_error_icons: true
  max_error_icons_per_row: 5
  cultures:
  - Пшеница
  - Ячмень
  - Рапс
  - Подсолнечник
  - Кукуруза
  - Горох
  - Гречиха
  - Овёс
  dialogs:
    show_shutdown_confirmation: true
project_info:
  name: Бортовой компьютер Дон 1500б
  version: 1.0.0
  description: Система мониторинга датчиков комбайна на основе Raspberry Pi 5
  hardware:
  - Raspberry Pi 5
  - Дисплей 1200×600 (7 дюймов, сенсорный)
  - Модуль оптической изоляции (8-канальный, 24V to 5V)
  - Датчики (импульсные, дискретные, аналоговые)
  os: Ubuntu 24.04 LTS
  python_version: 3.11+
  last_updated: '2024-05-20'
