mode: prod
sensors:
  polling_frequency_hz: 50
  list:
    drum:
      gpio: 17
      type: impulse
      nominal_rpm: 800
      warn_low: 600
      warn_high: 1000
      error_threshold_low: 100
      error_duration_ms: 2000
      debounce_ms: 50
      description: Скорость вращения барабана
      units: об/мин
    kolosa:
      gpio: 27
      type: impulse
      nominal_rpm: 400
      warn_low: 300
      warn_high: 500
      error_threshold_low: 50
      error_duration_ms: 2000
      debounce_ms: 50
      description: Скорость вращения колосового механизма
      units: об/мин
    solomotryas:
      gpio: 24
      type: impulse
      nominal_rpm: 600
      warn_low: 450
      warn_high: 750
      error_threshold_low: 80
      error_duration_ms: 2000
      debounce_ms: 50
      description: Скорость вращения соломотряса
      units: об/мин
    fan_speed:
      gpio: 23
      type: impulse
      nominal_rpm: 1200
      warn_low: 1000
      warn_high: 1400
      error_threshold_low: 200
      error_duration_ms: 2000
      debounce_ms: 50
      description: Скорость вращения вентилятора
      units: об/мин
    bin_level:
      gpio: 22
      type: discrete
      description: Уровень заполнения бункера
      units: статус
      debounce_ms: 100
unload_logic:
  bin_full_sensor: 22
  min_full_duration_ms: 1000
  min_empty_duration_ms: 500
  debounce_ms: 100
  description: Логика определения событий разгрузки
error_history:
  max_entries: 20
logging:
  data_dir: data
  date_format: '%Y-%m-%d'
  csv_log_enabled: true
  description: Логирование событий в CSV
ui:
  resolution:
    width: 1200
    height: 600
  orientation: horizontal
  fonts:
    title: 32
    value: 28
    label: 16
    time: 24
    menu: 18
  theme: light
  window_mode: windowed
  transparent: false
  colors_light:
    background: '#FFFFFF'
    text_primary: '#000000'
    text_secondary: '#666666'
    error_critical: '#E63946'
    error_warning: '#F77F00'
    border: '#CCCCCC'
    menu_background: '#F5F5F5'
  colors_dark:
    background: '#1E1E1E'
    text_primary: '#FFFFFF'
    text_secondary: '#AAAAAA'
    error_critical: '#FF6B6B'
    error_warning: '#FFB800'
    border: '#333333'
    menu_background: '#2A2A2A'
interface:
  display_sensors:
  - drum
  - kolosa
  - solomotryas
  - fan_speed
  main_sensor: drum
  ui_update_frequency_hz: 10
  show_time: true
  time_format: '%H:%M:%S'
  show_error_icons: true
  max_error_icons_per_row: 5
  cultures:
  - Пшеница
  - Ячмень
  - Рапс
  - Подсолнечник
  - Кукуруза
  - Горох
  - Гречиха
  - Овёс
  dialogs:
    show_shutdown_confirmation: true
project_info:
  name: Бортовой компьютер Дон 1500б
  version: 1.0.0
  description: Система мониторинга датчиков комбайна на основе Raspberry Pi 5
  hardware:
  - Raspberry Pi 5
  - Дисплей 1200×600 (7 дюймов, сенсорный)
  - Модуль оптической изоляции (8-канальный, 24V to 5V)
  - Датчики (импульсные, дискретные, аналоговые)
  os: Ubuntu 24.04 LTS
  python_version: 3.11+
  last_updated: '2024-05-20'
